<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Organisation Map</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
    }

    .navbar {
      background: #005eb8;
      padding: 0 24px;
      display: flex;
      align-items: center;
      height: 52px;
    }
    .navbar-logo {
      font-size: 22px;
      font-weight: 700;
      color: white;
      text-decoration: none;
      margin-right: 20px;
    }
    .navbar a {
      color: white;
      text-decoration: underline;
      font-size: 14px;
      padding: 0 16px;
      height: 52px;
      display: inline-flex;
      align-items: center;
    }
    .navbar a.active {
      font-weight: bold;
    }

    .toolbar {
      background: white;
      border-bottom: 1px solid #ddd;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .toolbar h2 {
      font-size: 16px;
      font-weight: 700;
      color: #003366;
    }
    .toolbar-sep {
      width: 1px;
      height: 24px;
      background: #ddd;
    }
    .toolbar span {
      font-size: 13px;
      color: #666;
    }
    .search-box {
      margin-left: auto;
      display: flex;
      align-items: center;
      background: #f0f4f8;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 5px 10px;
      gap: 6px;
    }
    .search-box input {
      border: none;
      background: transparent;
      outline: none;
      font-size: 13px;
      width: 200px;
    }

    .map-area {
      position: relative;
      width: 100%;
      height: calc(100vh - 104px);
      overflow: hidden;
      background: #e8f2fa;
      background-image: radial-gradient(circle, #b8cfe0 1px, transparent 1px);
      background-size: 28px 28px;
    }

    .map-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .node-wrap {
      position: absolute;
      text-align: center;
    }
    .node {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 3px solid rgba(255,255,255,0.5);
      margin: 0 auto;
    }
    .node.highlighted {
      outline: 4px solid #F39C12;
    }
    .node-abbr {
      font-size: 14px;
      font-weight: 700;
      color: white;
    }
    .node-type {
      font-size: 8px;
      color: rgba(255,255,255,0.85);
      padding: 0 4px;
      text-align: center;
    }
    .node-label {
      font-size: 11px;
      font-weight: 600;
      color: #1a1a2e;
      margin-top: 6px;
      white-space: nowrap;
    }

    .legend {
      position: absolute;
      top: 14px;
      right: 14px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .legend h5 {
      font-size: 12px;
      font-weight: 700;
      color: #003366;
      margin-bottom: 8px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 5px;
    }
    .legend-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .legend-line {
      width: 30px;
      border-top: 2px dashed #0072C9;
    }
  </style>
</head>
<body>

<div class="navbar">
  <a class="navbar-logo" href="#">sky</a>
  <a href="teams.html">Teams</a>
  <a href="organisation.html" class="active">Organisation</a>
  <a href="messages.html">Messages</a>
  <a href="schedule.html">Schedule</a>
</div>

<div class="toolbar">
  <h2>Organisation Map</h2>
  <div class="toolbar-sep"></div>
  <span id="stats-label">Teams: 0 · Dependencies: 0</span>
  <div class="search-box">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search-input" placeholder="Search teams…" oninput="onSearch(this.value)"/>
    <button onclick="clearSearch()" style="background:none;border:none;cursor:pointer;font-size:14px;color:#666;">×</button>
  </div>
</div>

<div class="map-area" id="map-area">
  <svg class="map-svg" id="arrow-svg"></svg>

  <div class="legend">
    <h5>Legend</h5>
    <div class="legend-item"><div class="legend-dot" style="background:#0072C9;"></div> Frontend</div>
    <div class="legend-item"><div class="legend-dot" style="background:#27AE60;"></div> Backend</div>
    <div class="legend-item"><div class="legend-dot" style="background:#8E44AD;"></div> DevOps</div>
    <div class="legend-item"><div class="legend-dot" style="background:#E67E22;"></div> QA</div>
    <div class="legend-item"><div class="legend-dot" style="background:#E74C3C;"></div> Data</div>
    <div class="legend-item"><div class="legend-dot" style="background:#16A085;"></div> Mobile</div>
    <hr style="border:none;border-top:1px solid #ddd;margin:8px 0;"/>
    <div class="legend-item"><div class="legend-line"></div> Dependency</div>
  </div>
</div>

<script>
  const TEAMS = {{ teams_json|safe }};

  const COLOUR_MAP = {
    'infrastructure': '#8E44AD',
    'ci/cd':          '#8E44AD',
    'devops':         '#8E44AD',
    'frontend':       '#0072C9',
    'ui':             '#0072C9',
    'backend':        '#27AE60',
    'api':            '#27AE60',
    'mobile':         '#16A085',
    'data':           '#E74C3C',
    'qa':             '#E67E22',
    'testing':        '#E67E22',
  };

  function getColour(team) {
    if (team.color) return team.color;
    const f = (team.focus || '').toLowerCase();
    for (const [key, col] of Object.entries(COLOUR_MAP)) {
      if (f.includes(key)) return col;
    }
    return '#6B7280';
  }

  function getAbbr(name, usedAbbrs) {
    const words = name.split(' ').filter(w => w.length > 1);
    let abbr = words.slice(0, 2).map(w => w[0]).join('').toUpperCase();
    if (usedAbbrs.has(abbr)) {
      abbr = words.slice(0, 3).map(w => w[0]).join('').toUpperCase();
    }
    if (usedAbbrs.has(abbr)) {
      abbr = (words[0] || '').substring(0, 3).toUpperCase();
    }
    usedAbbrs.add(abbr);
    return abbr;
  }

  function getPositions(teams, w, h) {
    const cx = w / 2;
    const cy = h / 2;
    const rx = Math.min(w, h) * 0.38;
    const ry = Math.min(w, h) * 0.32;
    const positions = {};
    teams.forEach((team, i) => {
      const angle = (2 * Math.PI * i / teams.length) - Math.PI / 2;
      positions[team.id] = {
        x: cx + rx * Math.cos(angle),
        y: cy + ry * Math.sin(angle)
      };
    });
    return positions;
  }

  function drawArrows(positions, teams) {
    const svg = document.getElementById('arrow-svg');
    svg.innerHTML = `<defs>
      <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#A8BAD0"/>
      </marker>
    </defs>`;

    teams.forEach(team => {
      (team.deps || []).forEach(depId => {
        if (!positions[depId]) return;
        const p1 = positions[team.id];
        const p2 = positions[depId];
        const angle = Math.atan2(p2.y - p1.y, p2.x - p1.x);
        const r = 43;
        const x1 = p1.x + Math.cos(angle) * r;
        const y1 = p1.y + Math.sin(angle) * r;
        const x2 = p2.x - Math.cos(angle) * r;
        const y2 = p2.y - Math.sin(angle) * r;
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', x1);
        line.setAttribute('y1', y1);
        line.setAttribute('x2', x2);
        line.setAttribute('y2', y2);
        line.setAttribute('stroke', '#A8BAD0');
        line.setAttribute('stroke-width', '1.5');
        line.setAttribute('stroke-dasharray', '6,4');
        line.setAttribute('marker-end', 'url(#arrowhead)');
        svg.appendChild(line);
      });
    });
  }

  function renderNodes(teams, positions, usedAbbrs) {
    const area = document.getElementById('map-area');
    area.querySelectorAll('.node-wrap').forEach(n => n.remove());

    teams.forEach(team => {
      const p = positions[team.id];
      const abbr = getAbbr(team.name, usedAbbrs);
      const colour = getColour(team);
      const shortType = (team.dep_type || '').length > 12
        ? (team.dep_type || '').substring(0, 11) + '…'
        : (team.dep_type || '');
      const shortName = team.name.length > 18
        ? team.name.substring(0, 16) + '…'
        : team.name;

      const wrap = document.createElement('div');
      wrap.className = 'node-wrap';
      wrap.style.left = (p.x - 40) + 'px';
      wrap.style.top = (p.y - 40) + 'px';
      wrap.style.width = '80px';
      wrap.dataset.name = team.name.toLowerCase();

      wrap.innerHTML = `
        <div class="node" style="background:${colour};">
          <span class="node-abbr">${abbr}</span>
          <span class="node-type">${shortType}</span>
        </div>
        <div class="node-label">${shortName}</div>
      `;

      area.appendChild(wrap);
    });
  }

  function onSearch(val) {
    const q = val.trim().toLowerCase();
    document.querySelectorAll('.node-wrap').forEach(wrap => {
      const name = wrap.dataset.name || '';
      if (!q) {
        wrap.querySelector('.node').classList.remove('highlighted');
      } else if (name.includes(q)) {
        wrap.querySelector('.node').classList.add('highlighted');
      } else {
        wrap.querySelector('.node').classList.remove('highlighted');
      }
    });
  }

  function clearSearch() {
    document.getElementById('search-input').value = '';
    onSearch('');
  }

  function updateStats() {
    const depCount = TEAMS.reduce((acc, t) => acc + (t.deps || []).length, 0);
    document.getElementById('stats-label').textContent =
      'Teams: ' + TEAMS.length + ' · Dependencies: ' + depCount;
  }

  window.addEventListener('DOMContentLoaded', () => {
    const area = document.getElementById('map-area');
    const w = area.offsetWidth;
    const h = area.offsetHeight;
    const positions = getPositions(TEAMS, w, h);
    const usedAbbrs = new Set();
    renderNodes(TEAMS, positions, usedAbbrs);
    drawArrows(positions, TEAMS);
    updateStats();
  });

  window.addEventListener('resize', () => {
    const area = document.getElementById('map-area');
    const w = area.offsetWidth;
    const h = area.offsetHeight;
    const positions = getPositions(TEAMS, w, h);
    const usedAbbrs = new Set();
    renderNodes(TEAMS, positions, usedAbbrs);
    drawArrows(positions, TEAMS);
  });
</script>
</body>
</html>
